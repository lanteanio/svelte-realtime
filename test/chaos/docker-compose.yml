services:
  redis:
    image: redis:7-alpine
    container_name: svelte-realtime-chaos-redis
    # Bind to an OS-assigned host port so we never collide with productive
    # Redis instances on this machine. The chaos harness reads the actual
    # port via `docker compose port redis 6379` after `up`.
    ports:
      - "0:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 1s
      retries: 30
